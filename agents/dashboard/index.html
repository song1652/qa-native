<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA 컨트롤 센터</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overflow: hidden; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: #30363d;
  --senior-bg: #1c2d4a;
  --senior-border: #1f4580;
  --senior-accent: #58a6ff;
  --junior-bg: #1a2e1e;
  --junior-border: #1d5230;
  --junior-accent: #3fb950;
  --delib-bg: #2a1f3d;
  --delib-border: #6e40c9;
  --delib-accent: #d2a8ff;
  --approved-bg: #1a2e1e;
  --approved-color: #3fb950;
  --approved-border: #238636;
  --revision-bg: #2d1212;
  --revision-color: #f85149;
  --revision-border: #da3633;
  --pending-bg: #2d2200;
  --pending-color: #d29922;
  --pending-border: #9e6a03;
  --text: #c9d1d9;
  --text-dim: #8b949e;
  --radius: 10px;
  --accent: #6366f1;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Header ── */
.header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex; align-items: center; gap: 12px;
}
.header-title { font-size: 15px; font-weight: 600; color: #e6edf3; white-space: nowrap; }
.live-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--approved-color); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.reset-btn {
  font-size: 11px; font-weight: 600;
  padding: 5px 12px; border-radius: 8px;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.reset-btn:hover { background: var(--revision-bg); color: var(--revision-color); border-color: var(--revision-border); }
.header-meta { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

/* ── Layout ── */
.body-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.sidebar-bottom {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 10px 12px 14px;
  background: var(--surface);
}
.sidebar-section {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.sidebar-section:last-child { border-bottom: none; }
.sidebar-label {
  font-size: 10px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 4px 14px 6px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px; color: var(--text-dim);
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active {
  background: var(--surface2);
  color: var(--text);
  border-left-color: var(--senior-accent);
}
.sidebar-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--border);
}
.sidebar-dot.active-run { background: var(--pending-color); box-shadow: 0 0 4px var(--pending-color); }
.sidebar-dot.done { background: var(--approved-color); }
.sidebar-dot.pending { background: var(--border); }
.sidebar-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.sidebar-step { font-size: 10px; color: var(--text-dim); }

/* ── Content area ── */
.content-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.content-scroll {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  padding: 24px;
}

/* ── Session card ── */
.session {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.session:last-child { margin-bottom: 0; }
.session-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  background: var(--surface);
  cursor: pointer;
  user-select: none;
}
.session-header:hover { background: var(--surface2); }
.session-stage { font-size: 14px; font-weight: 600; flex: 1; }
.session-meta { font-size: 12px; color: var(--text-dim); }
.session-toggle { font-size: 12px; color: var(--text-dim); }
.status-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 12px; border-radius: 12px;
}
.status-in_progress { background: var(--pending-bg); color: var(--pending-color); border: 1px solid var(--pending-border); }
.status-approved     { background: var(--approved-bg); color: var(--approved-color); border: 1px solid var(--approved-border); }
.status-revision_needed { background: var(--revision-bg); color: var(--revision-color); border: 1px solid var(--revision-border); }

/* ── Messages ── */
.messages { padding: 20px; display: flex; flex-direction: column; gap: 18px; background: var(--bg); }
.messages.collapsed { display: none; }

.msg { display: flex; flex-direction: column; gap: 6px; }
.msg-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
.role-badge { font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
.role-senior { background: var(--senior-bg); color: var(--senior-accent); border: 1px solid var(--senior-border); }
.role-junior { background: var(--junior-bg); color: var(--junior-accent); border: 1px solid var(--junior-border); }
.role-deliberation { background: var(--delib-bg); color: var(--delib-accent); border: 1px solid var(--delib-border); }

.msg-bubble {
  padding: 14px 16px;
  border-radius: var(--radius);
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 13.5px;
}
.bubble-senior      { background: var(--senior-bg); border: 1px solid var(--senior-border); }
.bubble-junior      { background: var(--junior-bg); border: 1px solid var(--junior-border); }
.bubble-deliberation { background: var(--delib-bg); border: 1px solid var(--delib-border); }

.msg-status-tag {
  align-self: flex-start;
  font-size: 11px; font-weight: 600;
  padding: 2px 10px; border-radius: 10px;
  margin-top: 2px;
}

/* ── Plan toggle ── */
.plan-toggle {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--junior-accent);
  cursor: pointer; margin-top: 6px;
  padding: 4px 12px; border-radius: 8px;
  border: 1px solid var(--junior-border);
  background: transparent; font-family: inherit;
}
.plan-toggle:hover { background: var(--junior-bg); }
.plan-body {
  margin-top: 8px; padding: 14px; border-radius: 8px;
  background: #0a0e14; border: 1px solid var(--border);
  font-size: 12.5px; font-family: 'Consolas', 'Courier New', monospace;
  white-space: pre-wrap; word-break: break-all;
  color: #a8d8a8; display: none;
  max-height: 400px; overflow-y: auto;
}
.plan-body.open { display: block; }

/* ── Empty state ── */
.empty { text-align: center; padding: 80px 0; color: var(--text-dim); }
.empty-icon { font-size: 40px; margin-bottom: 16px; }
.empty h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.empty p { font-size: 13px; }
.waiting-msg { text-align: center; padding: 24px; color: var(--text-dim); font-size: 13px; }

.new-topic-input {
  width: 100%; padding: 8px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 12px; font-family: inherit;
  resize: none; line-height: 1.5;
  transition: border-color .15s;
}
.new-topic-input:focus { outline: none; border-color: var(--delib-border); }
.new-topic-btn {
  width: 100%; padding: 7px;
  background: var(--delib-bg); color: var(--delib-accent);
  border: 1px solid var(--delib-border); border-radius: 8px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.new-topic-btn:hover { background: #3d2a5c; }
.new-topic-btn:disabled { opacity: .5; cursor: not-allowed; }
.topic-status { font-size: 11px; color: var(--text-dim); text-align: center; min-height: 16px; margin-top: 10px; }
.topic-status.ok  { color: var(--approved-color); }
.topic-status.err { color: var(--revision-color); }

/* ── 항목별 투표 섹션 ── */
.vote-section {
  padding: 16px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.vote-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.vote-section-label { font-size: 12px; color: var(--text-dim); }
.vote-progress { font-size: 11px; font-weight: 700; color: var(--text-dim); }
.vote-item {
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; overflow: hidden; transition: border-color .2s;
  cursor: pointer;
}
.vote-item:last-child { margin-bottom: 0; }
.vote-item[data-status="approved"] { border-color: var(--approved-border); }
.vote-item[data-status="rejected"] { border-color: var(--revision-border); }
.vote-item-top {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface2);
}
.vote-item-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.vote-item-body {
  padding: 10px 14px; font-size: 12px; color: var(--text-dim);
  background: var(--bg); white-space: pre-wrap; line-height: 1.6;
  display: block;
}
.vote-item.collapsed .vote-item-body { display: none; }
.vote-tag {
  font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px;
}
.vote-tag-approve { background: var(--approved-bg); color: var(--approved-color); border: 1px solid var(--approved-border); }
.vote-tag-reject  { background: var(--revision-bg);  color: var(--revision-color); border: 1px solid var(--revision-border); }
.vote-btn-y {
  padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
  background: transparent; color: var(--approved-color);
  border: 1px solid var(--approved-border);
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.vote-btn-y:hover { background: var(--approved-bg); }
.vote-btn-n {
  padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.vote-btn-n:hover { background: var(--revision-bg); color: var(--revision-color); border-color: var(--revision-border); }

/* ── 승인 액션 바 ── */
.approve-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.approve-bar-label { flex: 1; font-size: 12px; color: var(--text-dim); }
.btn-approve {
  padding: 7px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: var(--approved-bg); color: var(--approved-color);
  border: 1px solid var(--approved-border);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn-approve:hover { background: #1f3d24; }
.btn-reject {
  padding: 7px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.btn-reject:hover { background: var(--revision-bg); color: var(--revision-color); border-color: var(--revision-border); }
.reject-reason-wrap { display: none; padding: 0 20px 14px; background: var(--surface); }
.reject-reason-input {
  width: 100%; padding: 8px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px; font-family: inherit;
  margin-bottom: 8px;
}
.reject-reason-input:focus { outline: none; border-color: var(--revision-border); }
.btn-reject-confirm {
  padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
  background: var(--revision-bg); color: var(--revision-color);
  border: 1px solid var(--revision-border);
  cursor: pointer; font-family: inherit;
}
.btn-reject-cancel {
  padding: 6px 16px; border-radius: 8px; font-size: 12px;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  cursor: pointer; font-family: inherit; margin-left: 6px;
}

/* ── Pipeline Monitor ── */
.pipeline-view { padding: 24px; }
.pipeline-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.step-progress {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 24px; padding: 16px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.step-node {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  min-width: 70px; position: relative;
}
.step-circle {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  border: 2px solid var(--border); background: var(--bg); color: var(--text-dim);
  transition: all .3s;
}
.step-circle.active { border-color: var(--pending-color); background: var(--pending-bg); color: var(--pending-color); box-shadow: 0 0 8px rgba(210,153,34,.3); }
.step-circle.done { border-color: var(--approved-color); background: var(--approved-bg); color: var(--approved-color); }
.step-label { font-size: 10px; color: var(--text-dim); text-align: center; max-width: 70px; }
.step-label.active { color: var(--pending-color); font-weight: 600; }
.step-label.done { color: var(--approved-color); }
.step-line {
  flex: 1; height: 2px; background: var(--border);
  margin: 0 4px; margin-bottom: 20px;
}
.step-line.done { background: var(--approved-color); }

.pipeline-info {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.pipeline-info-row {
  display: flex; gap: 16px; margin-bottom: 8px; font-size: 13px;
}
.pipeline-info-row:last-child { margin-bottom: 0; }
.pipeline-info-label { min-width: 100px; color: var(--text-dim); font-weight: 600; font-size: 12px; }
.pipeline-info-val { color: var(--text); }

.pipeline-actions {
  display: flex; gap: 10px; margin-top: 16px;
}

/* ── Run Pipeline Form ── */
.run-pipeline-form {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px;
}
.run-pipeline-form h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #e6edf3;
}
.run-form-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.run-form-row:last-child { margin-bottom: 0; }
.run-form-label {
  min-width: 80px; font-size: 12px; font-weight: 600; color: var(--text-dim);
}
.run-form-select {
  flex: 1; padding: 8px 12px; font-size: 13px;
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; outline: none; cursor: pointer;
}
.run-form-select:focus { border-color: var(--accent); }
.run-form-select option { background: var(--bg); color: var(--text); }
.run-form-url-display {
  flex: 1; font-size: 13px; color: var(--text-dim); padding: 8px 12px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  min-height: 34px;
}
.run-form-actions { display: flex; gap: 10px; margin-top: 16px; }
.run-log-box {
  margin-top: 12px; max-height: 200px; overflow-y: auto;
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px; font-family: 'SF Mono', Consolas, monospace; font-size: 11px;
  color: var(--text-dim); white-space: pre-wrap; word-break: break-all;
  display: none;
}

.batch-summary {
  display: flex; gap: 16px; margin-bottom: 20px;
}
.batch-stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px; flex: 1; text-align: center;
}
.batch-stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.batch-stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

/* ── Parallel Execution Results ── */
.exec-result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
}
.exec-result-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.exec-result-title { font-size: 14px; font-weight: 700; }
.exec-result-badge {
  font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 20px; letter-spacing: .5px;
}
.exec-result-badge.pass { background: rgba(34,197,94,.1); color: #3fb950; border: 1px solid rgba(34,197,94,.25); }
.exec-result-badge.fail { background: rgba(239,68,68,.1); color: #f85149; border: 1px solid rgba(239,68,68,.25); }
.exec-result-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.exec-stat {
  background: var(--surface2); border-radius: 8px; padding: 14px; text-align: center;
}
.exec-stat-num { font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.exec-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.group-result-list { display: flex; flex-direction: column; gap: 8px; }
.group-result-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: var(--surface2); border-radius: 8px;
}
.group-result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.group-result-dot.pass { background: #3fb950; box-shadow: 0 0 6px rgba(63,185,80,.4); }
.group-result-dot.fail { background: #f85149; box-shadow: 0 0 6px rgba(248,81,73,.4); }
.group-result-name { flex: 1; font-size: 13px; font-weight: 600; }
.group-result-count { font-size: 12px; color: var(--text-dim); }
.group-result-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 12px;
}
.group-result-badge.pass { background: rgba(34,197,94,.1); color: #3fb950; }
.group-result-badge.fail { background: rgba(239,68,68,.1); color: #f85149; }
.parallel-report-wrap {
  margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; background: #fff;
}
.parallel-report-wrap iframe {
  width: 100%; height: calc(100vh - 300px); border: none;
}

.action-btn {
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s; border: 1px solid;
}
.action-btn-primary {
  background: var(--senior-bg); color: var(--senior-accent); border-color: var(--senior-border);
}
.action-btn-primary:hover { background: #243b5e; }
.action-btn-success {
  background: var(--approved-bg); color: var(--approved-color); border-color: var(--approved-border);
}
.action-btn-success:hover { background: #1f3d24; }
.action-btn-danger {
  background: transparent; color: var(--text-dim); border-color: var(--border);
}
.action-btn-danger:hover { background: var(--revision-bg); color: var(--revision-color); border-color: var(--revision-border); }

/* (run-panel CSS removed — replaced by .run-pipeline-form) */

/* ── Reports ── */
.report-list { margin-top: 16px; }
.report-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; cursor: pointer; transition: border-color .2s;
}
.report-item:hover { border-color: var(--senior-accent); }
.report-icon { font-size: 20px; }
.report-info { flex: 1; }
.report-name { font-size: 13px; font-weight: 600; color: var(--text); }
.report-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.report-open-btn {
  font-size: 11px; padding: 4px 12px; border-radius: 6px;
  background: var(--senior-bg); color: var(--senior-accent);
  border: 1px solid var(--senior-border);
  cursor: pointer; font-family: inherit;
}
.report-iframe-wrap {
  margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; background: #fff;
}
.report-iframe-wrap iframe {
  width: 100%; height: calc(100vh - 200px); border: none;
}

/* ── Toast notification ── */
.toast-container {
  position: fixed; top: 16px; right: 16px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  pointer-events: auto;
  padding: 10px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500; max-width: 360px;
  animation: toastIn 0.25s ease-out, toastOut 0.3s ease-in 3.2s forwards;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
.toast-error   { background: var(--revision-bg); color: var(--revision-color); border: 1px solid var(--revision-border); }
.toast-success { background: var(--approved-bg); color: var(--approved-color); border: 1px solid var(--approved-border); }
.toast-info    { background: var(--pending-bg); color: var(--pending-color); border: 1px solid var(--pending-border); }
@keyframes toastIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }

/* ── Info banner ── */
.info-banner {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
  font-size: 12px; line-height: 1.6; color: var(--text-dim);
  background: var(--surface2); border: 1px solid var(--border);
}
.info-banner-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ── Log toggle ── */
.log-toggle-btn {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px;
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  cursor: pointer; font-family: inherit; transition: all .15s; margin-left: 8px;
}
.log-toggle-btn:hover { background: var(--surface2); color: var(--text); }
.run-log-box.expanded { max-height: 600px; }

/* ── Quick Run ── */
.quick-group-list { display: flex; flex-direction: column; gap: 6px; }
.quick-group-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  cursor: pointer; transition: background .15s;
  font-size: 13px;
}
.quick-group-item:hover { background: var(--surface2); }
.quick-group-item input[type="checkbox"] {
  accent-color: var(--senior-accent); width: 16px; height: 16px; cursor: pointer;
}
.quick-group-name { font-weight: 500; color: var(--text); flex: 1; }
.quick-group-count { font-size: 12px; color: var(--text-dim); }

/* ── Import ── */
.import-sheet-list { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; max-height: 300px; overflow-y: auto; }
.import-sheet-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s; font-size: 12px;
}
.import-sheet-item:hover { background: var(--surface2); }
.import-sheet-item input[type="checkbox"] {
  accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer;
}
.import-sheet-name { font-weight: 500; color: var(--text); flex: 1; }
.import-sheet-count { font-size: 11px; color: var(--text-dim); }
.import-convert-btn {
  width: 100%; padding: 7px;
  background: #1a2e4a; color: var(--senior-accent);
  border: 1px solid #2a4a6e; border-radius: 8px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.import-convert-btn:hover { background: #1f3d5e; }
.import-convert-btn:disabled { opacity: .5; cursor: not-allowed; }
.import-status { font-size: 11px; color: var(--text-dim); text-align: center; min-height: 16px; margin-top: 8px; }
.import-status.ok { color: var(--approved-color); }
.import-status.err { color: var(--revision-color); }
.import-result-item { font-size: 11px; color: var(--text-dim); padding: 2px 0; }
.import-result-item .count { color: var(--approved-color); font-weight: 600; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="toast-container" id="toast-container"></div>
<div class="header">
  <div class="live-indicator">
    <div class="live-dot"></div>
    LIVE
  </div>
  <div class="header-title">QA 컨트롤 센터</div>
  <div style="flex:1"></div>
  <button class="reset-btn" onclick="resetDialog()" id="reset-btn">대화 초기화</button>
  <div class="header-meta" id="header-meta"></div>
</div>

<div class="body-wrap">
  <!-- 사이드바 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-scroll">
      <!-- 파이프라인 섹션 -->
      <div class="sidebar-section">
        <div class="sidebar-label">파이프라인</div>
        <div class="sidebar-item" id="tab-single_pipeline" onclick="selectView('single_pipeline')">
          <div class="sidebar-dot" id="dot-single"></div>
          <span class="sidebar-name">단일 파이프라인</span>
        </div>
        <div class="sidebar-item" id="tab-parallel_pipeline" onclick="selectView('parallel_pipeline')">
          <div class="sidebar-dot" id="dot-parallel"></div>
          <span class="sidebar-name">병렬 파이프라인</span>
        </div>
        <div class="sidebar-item" id="tab-quick_run" onclick="selectView('quick_run')">
          <div class="sidebar-dot" id="dot-quick"></div>
          <span class="sidebar-name">빠른 실행</span>
        </div>
      </div>

      <!-- 테스트 리포트 섹션 -->
      <div class="sidebar-section">
        <div class="sidebar-label">테스트 리포트</div>
        <div class="sidebar-item" id="tab-reports" onclick="selectView('reports')">
          <div class="sidebar-dot"></div>
          <span class="sidebar-name">리포트 목록</span>
        </div>
      </div>

      <!-- 팀 토론 섹션 -->
      <div class="sidebar-section" id="team-section">
        <div class="sidebar-label">팀 토론</div>
        <div style="padding: 6px 12px 10px;">
          <div style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">새 토론 주제</div>
          <textarea class="new-topic-input" id="new-topic-input"
            placeholder="주제를 입력하세요..." rows="3"></textarea>
          <button class="new-topic-btn" id="new-topic-btn" onclick="submitTopic()">토론 시작</button>
          <div class="topic-status" id="topic-status"></div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:6px;line-height:1.5;"></div>
        </div>
        <div id="team-tabs"></div>
      </div>

      <!-- Import 섹션 -->
      <div class="sidebar-section" id="import-section">
        <div class="sidebar-label">Import</div>
        <div style="padding: 6px 12px 10px;">
          <div style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Excel → 테스트케이스</div>
          <select class="run-form-select" id="import-file-select" onchange="onImportFileSelect()" style="width:100%;margin-bottom:6px;">
            <option value="">파일 선택...</option>
          </select>
          <div id="import-sheet-list" class="import-sheet-list"></div>
          <button class="import-convert-btn" id="import-convert-btn" onclick="runImportConvert()" disabled>변환</button>
          <div class="import-status" id="import-status"></div>
          <div id="import-results"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 콘텐츠 -->
  <div class="content-wrap">
    <div class="content-scroll" id="main">
      <div class="empty">
        <div class="empty-icon">&#x1F3AF;</div>
        <h2>QA 컨트롤 센터</h2>
        <p>왼쪽 패널에서 항목을 선택하세요</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── Toast notifications ──
function showToast(msg, type='error') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 3600);
}

// ── Log toggle ──
function toggleLogExpand(logAreaId) {
  const area = document.getElementById(logAreaId);
  if (!area) return;
  area.classList.toggle('expanded');
  const btn = area.parentElement.querySelector('.log-toggle-btn');
  if (btn) btn.textContent = area.classList.contains('expanded') ? '축소' : '확대';
}

const ROLE_LABEL = { senior:'사수', junior:'부사수', deliberation:'심의' };
const ROLE_CLASS = { senior:'role-senior', junior:'role-junior', deliberation:'role-deliberation' };
const BUBBLE_CLASS = { senior:'bubble-senior', junior:'bubble-junior', deliberation:'bubble-deliberation' };
const STATUS_LABEL = {
  in_progress:'진행 중', discussed:'결론 도출', approved:'승인됨',
  revision_needed:'수정 요청', rejected:'반려됨',
};
const STATUS_CLASS = {
  in_progress:'status-in_progress', discussed:'status-in_progress',
  approved:'status-approved', revision_needed:'status-revision_needed', rejected:'status-revision_needed',
};
const MSG_STATUS_STYLE = {
  approved: 'background:#1a2e1e;color:#3fb950;border:1px solid #238636',
  revision_needed: 'background:#2d1212;color:#f85149;border:1px solid #da3633',
};

const PIPELINE_STEPS = ['init','analyzed','planned','generated','reviewed','approved','done'];
const STEP_LABELS = { init:'Init', analyzed:'분석', planned:'계획', generated:'생성', reviewed:'리뷰', approved:'승인', done:'완료', heal_needed:'힐링중', heal_failed:'힐링실패' };

const PARALLEL_STEPS = ['init','analyzing','ready','generating','testing','done'];
const PARALLEL_STEP_LABELS = { init:'초기화', analyzing:'DOM 분석', ready:'코드 생성 대기', generating:'코드 생성', testing:'테스트 실행', done:'완료', heal_needed:'힐링중', heal_failed:'힐링실패' };

let lastJson = '';
let refreshCount = 0;
let collapsedSessions = {};
let currentView = '';
let lastData = null;
let pipelineState = null;
let batchState = null;
let reportsList = [];
let pagesData = { pages: {}, groups: [] };
let generatedGroups = [];
let quickState = {};

// UI 상태 보존 (리프레시 시 유지)
let _uiState = {
  openReportName: null,         // 리포트 뷰: 열린 리포트 이름
  parallelReportName: null,     // 병렬 뷰: 열린 리포트 이름
  mergeLogVisible: false,       // 병렬 뷰: merge 로그 표시 여부
  mergeLogContent: '',          // 병렬 뷰: merge 로그 내용
  scrollTop: {},                // 뷰별 스크롤 위치
};
// 데이터 변경 감지용 이전 상태 해시
let _prevPipelineJson = '';
let _prevBatchJson = '';
let _prevReportsJson = '';

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString('ko-KR', {hour12:false}); } catch { return ''; }
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour12:false});
  } catch { return ''; }
}

// ── View switching ──
function selectView(viewId) {
  currentView = viewId;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('tab-' + viewId);
  if (el) el.classList.add('active');
  renderCurrentView();
}

function renderCurrentView() {
  const main = document.getElementById('main');
  if (currentView === 'single_pipeline') {
    renderSinglePipeline(main);
  } else if (currentView === 'parallel_pipeline') {
    renderParallelPipeline(main);
  } else if (currentView === 'quick_run') {
    renderQuickRun(main);
  } else if (currentView === 'reports') {
    renderReports(main);
  } else if (currentView.startsWith('team_')) {
    renderTeamView(main);
  } else {
    main.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F3AF;</div><h2>QA 컨트롤 센터</h2><p>왼쪽 패널에서 항목을 선택하세요</p></div>';
  }
}

// ── Run Panel Builder ──
function buildRunPanel(mode) {
  const groups = pagesData.groups || [];
  if (mode === 'single') {
    const pages = pagesData.pages || {};
    let pageOpts = '<option value="">-- 페이지 선택 --</option>';
    for (const [name, url] of Object.entries(pages)) {
      pageOpts += `<option value="${esc(name)}" data-url="${esc(url)}">${esc(name)}</option>`;
    }
    let caseOpts = '<option value="">-- 케이스 폴더 선택 --</option>';
    groups.forEach(g => {
      caseOpts += `<option value="${esc(g.name)}">${esc(g.name)} (${g.count}개 케이스)</option>`;
    });
    return `
      <div class="run-pipeline-form">
        <h3>run_qa.py 실행</h3>
        <div class="run-form-row">
          <span class="run-form-label">페이지</span>
          <select class="run-form-select" id="run-page-select" onchange="onPageSelect()">${pageOpts}</select>
        </div>
        <div class="run-form-row">
          <span class="run-form-label">URL</span>
          <div class="run-form-url-display" id="run-url-display">페이지를 선택하세요</div>
        </div>
        <div class="run-form-row">
          <span class="run-form-label">케이스</span>
          <select class="run-form-select" id="run-case-select">${caseOpts}</select>
        </div>
        <div class="run-form-actions">
          <button class="action-btn action-btn-primary" id="run-single-btn" onclick="runSingleQA()" ${!groups.length ? 'disabled title="testcases/ 폴더에 케이스가 없습니다"' : ''}>run_qa.py 실행</button>
          ${!groups.length ? '<span style="font-size:11px;color:var(--danger);margin-left:8px;">testcases/ 폴더에 케이스 파일이 없습니다</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;margin-top:8px;">
          <div class="run-log-box" id="run-single-log" style="flex:1;margin-top:0;"><pre id="run-single-log-content" style="margin:0;"></pre></div>
        </div>
        <button class="log-toggle-btn" id="log-toggle-single" onclick="toggleLogExpand('run-single-log')" style="display:none;margin-top:4px;">확대</button>
      </div>`;
  } else {
    return `
      <div class="run-pipeline-form">
        <h3>run_qa_parallel.py 실행</h3>
        <div class="run-form-row">
          <span class="run-form-label">대상</span>
          <span style="font-size:12px;color:var(--text-dim);">config/pages.json + testcases/ 자동 스캔 → subagent 병렬 코드 생성</span>
        </div>
        <div class="run-form-actions">
          <button class="action-btn action-btn-primary" id="run-parallel-btn" onclick="runParallelQA()" ${!groups.length ? 'disabled title="testcases/ 폴더에 케이스가 없습니다"' : ''}>run_qa_parallel.py 실행</button>
          ${!groups.length ? '<span style="font-size:11px;color:var(--danger);margin-left:8px;">testcases/ 폴더에 케이스 파일이 없습니다</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;margin-top:8px;">
          <div class="run-log-box" id="run-parallel-log" style="flex:1;margin-top:0;"><pre id="run-parallel-log-content" style="margin:0;"></pre></div>
        </div>
        <button class="log-toggle-btn" id="log-toggle-parallel" onclick="toggleLogExpand('run-parallel-log')" style="display:none;margin-top:4px;">확대</button>
      </div>`;
  }
}

function onPageSelect() {
  const sel = document.getElementById('run-page-select');
  const urlDisp = document.getElementById('run-url-display');
  const caseSel = document.getElementById('run-case-select');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const url = opt ? opt.getAttribute('data-url') : '';
  const pageName = sel.value;
  if (urlDisp) urlDisp.textContent = url || '페이지를 선택하세요';
  if (urlDisp) urlDisp.style.color = url ? 'var(--text)' : 'var(--text-dim)';
  // 같은 이름의 케이스 폴더 자동 선택
  if (caseSel && pageName) {
    for (let i = 0; i < caseSel.options.length; i++) {
      if (caseSel.options[i].value === pageName) { caseSel.selectedIndex = i; break; }
    }
  }
}

// 단일 파이프라인 실행
async function runSingleQA() {
  const pageSel = document.getElementById('run-page-select');
  const caseSel = document.getElementById('run-case-select');
  const btn = document.getElementById('run-single-btn');
  if (!pageSel || !caseSel) return;
  const opt = pageSel.options[pageSel.selectedIndex];
  const url = opt ? opt.getAttribute('data-url') : '';
  const casesDir = caseSel.value;
  if (!url || !casesDir) { showToast('페이지와 케이스 폴더를 선택하세요','info'); return; }
  if (btn) { btn.textContent = '실행 중...'; btn.disabled = true; }
  try {
    const res = await fetch('/api/run_qa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, cases_dir: casesDir }),
    });
    const data = await res.json();
    if (data.ok) {
      if (btn) btn.textContent = '실행됨 (PID: ' + (data.pid || '?') + ')';
      startLogPolling('run-single-log', 'run-single-log-content', 'run_qa.txt');
      waitForSingleInit(url);
      setTimeout(() => { if (btn) { btn.textContent = 'run_qa.py 실행'; btn.disabled = false; } }, 60000);
    } else {
      showToast('오류: ' + (data.error || 'unknown'));
      if (btn) { btn.textContent = 'run_qa.py 실행'; btn.disabled = false; }
    }
  } catch(e) {
    showToast('서버 연결 오류');
    if (btn) { btn.textContent = 'run_qa.py 실행'; btn.disabled = false; }
  }
}

// state/pipeline.json step=init + url 있으면 알림
function waitForSingleInit(url) {
  let elapsed = 0;
  const check = setInterval(async () => {
    elapsed += 2;
    if (elapsed > 60) { clearInterval(check); return; }
    try {
      const res = await fetch('/api/pipeline_state');
      const data = await res.json();
      if (data.step === 'init' && data.url) {
        clearInterval(check);
        showHookAlert('single_init', url + ' 파이프라인 초기화 완료');
      }
    } catch(e) {}
  }, 2000);
}

// 병렬 파이프라인 실행
async function runParallelQA() {
  const btn = document.getElementById('run-parallel-btn');
  if (btn) { btn.textContent = '실행 중...'; btn.disabled = true; }
  try {
    const res = await fetch('/api/run_qa_parallel', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      if (btn) btn.textContent = '실행됨 (PID: ' + (data.pid || '?') + ')';
      startLogPolling('run-parallel-log', 'run-parallel-log-content', 'run_parallel.txt');
      // state/parallel.json이 ready가 되면 알림 표시
      waitForParallelReady();
      setTimeout(() => { if (btn) { btn.textContent = 'run_qa_parallel.py 실행'; btn.disabled = false; } }, 60000);
    } else {
      showToast('오류: ' + (data.error || 'unknown'));
      if (btn) { btn.textContent = 'run_qa_parallel.py 실행'; btn.disabled = false; }
    }
  } catch(e) {
    showToast('서버 연결 오류');
    if (btn) { btn.textContent = 'run_qa_parallel.py 실행'; btn.disabled = false; }
  }
}

// state/parallel.json status=ready 감지 → Claude Code 안내 알림
function waitForParallelReady() {
  let elapsed = 0;
  const check = setInterval(async () => {
    elapsed += 2;
    if (elapsed > 120) { clearInterval(check); return; }
    try {
      const res = await fetch('/api/batch_state');
      const data = await res.json();
      if (data.parallel_state && data.parallel_state.status === 'ready') {
        clearInterval(check);
        const count = data.parallel_state.total_count || '?';
        showHookAlert('parallel', count + '개 테스트 대상이 준비되었습니다');
      }
    } catch(e) {}
  }, 2000);
}

function showHookAlert(type, detail) {
  const existing = document.getElementById('hook-alert');
  if (existing) existing.remove();

  const configs = {
    discuss: {
      icon: '&#x1F4AC;',
      title: '토론이 예약되었습니다',
      desc: `<strong style="color:#89b4fa;">"${esc(detail)}"</strong>`,
      action: 'Claude Code에서 <strong>아무 메시지</strong>를 보내주세요.<br>훅이 자동으로 토론을 시작합니다.'
    },
    parallel: {
      icon: '&#x1F680;',
      title: '병렬 실행 준비 완료',
      desc: `<strong style="color:#89b4fa;">${detail}</strong>`,
      action: 'Claude Code에서 <strong>아무 메시지</strong>를 보내주세요.<br>자동으로 subagent 실행이 시작됩니다.'
    },
    single_init: {
      icon: '&#x2699;&#xFE0F;',
      title: '단일 파이프라인 준비 완료',
      desc: `<strong style="color:#89b4fa;">${detail}</strong>`,
      action: 'Claude Code에서 <strong>아무 메시지</strong>를 보내주세요.<br>훅이 자동으로 파이프라인을 시작합니다.'
    },
    single_approved: {

// 로그 폴링 (3초 간격, 최대 120초)
let _logTimers = {};
function startLogPolling(logAreaId, logContentId, logFileName) {
  if (_logTimers[logAreaId]) clearInterval(_logTimers[logAreaId]);
  const area = document.getElementById(logAreaId);
  if (area) area.style.display = 'block';
  // 토글 버튼 표시
  const toggleId = logAreaId === 'run-single-log' ? 'log-toggle-single' : 'log-toggle-parallel';
  const toggleBtn = document.getElementById(toggleId);
  if (toggleBtn) toggleBtn.style.display = 'inline-block';
  let elapsed = 0;
  const poll = async () => {
    try {
      const res = await fetch('/api/run_log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ log: logFileName }),
      });
      const data = await res.json();
      const el = document.getElementById(logContentId);
      if (el) {
        el.textContent = data.log || '(대기 중...)';
        const logArea = document.getElementById(logAreaId);
        if (logArea) logArea.scrollTop = logArea.scrollHeight;
      }
    } catch(e) {}
    elapsed += 3;
    if (elapsed >= 120 && _logTimers[logAreaId]) {
      clearInterval(_logTimers[logAreaId]);
      delete _logTimers[logAreaId];
    }
  };
  poll();
  _logTimers[logAreaId] = setInterval(poll, 3000);
}

// ── Single Pipeline ──
function renderSinglePipeline(main) {
  // 선택값 보존 (5초 폴링으로 DOM 교체 시 리셋 방지)
  const prevPage = (document.getElementById('run-page-select') || {}).value || '';
  const prevCase = (document.getElementById('run-case-select') || {}).value || '';

  const state = pipelineState || {};
  const currentStep = state.step || 'init';
  // heal_needed/heal_failed는 approved 이후 단계이므로 approved 위치(5)에 active로 표시
  const isHeal = currentStep === 'heal_needed' || currentStep === 'heal_failed';
  const stepIdx = isHeal ? 6 : PIPELINE_STEPS.indexOf(currentStep);

  let stepsHtml = '';
  PIPELINE_STEPS.forEach((step, i) => {
    let cls = '';
    if (i < stepIdx) cls = 'done';
    else if (i === stepIdx) cls = 'active';
    // heal 상태에서 done(마지막) 위치는 힐링 색상
    if (isHeal && i === 6) cls = 'active';
    const labelCls = cls;
    const num = i + 1;
    const label = (isHeal && i === 6) ? STEP_LABELS[currentStep] : STEP_LABELS[step];
    stepsHtml += `<div class="step-node"><div class="step-circle ${cls}">${i < stepIdx ? '&#10003;' : num}</div><div class="step-label ${labelCls}">${label}</div></div>`;
    if (i < PIPELINE_STEPS.length - 1) {
      stepsHtml += `<div class="step-line ${i < stepIdx ? 'done' : ''}"></div>`;
    }
  });

  const url = state.url || '-';
  const healCount = state.heal_count || 0;
  const execResult = state.execution_result || {};

  let actionsHtml = '<div class="pipeline-actions">';
  if (currentStep === 'reviewed') {
    actionsHtml += `
        <button class="action-btn action-btn-success" onclick="pipelineApprove()">승인</button>
        <button class="action-btn action-btn-danger" onclick="pipelineRejectToggle()">반려</button>`;
  }
  actionsHtml += `<button class="action-btn action-btn-danger" onclick="pipelineReset()" style="margin-left:auto;">파이프라인 초기화</button></div>`;
  if (currentStep === 'reviewed') {
    actionsHtml += `
      <div id="pipeline-reject-wrap" style="display:none;margin-top:10px;">
        <input type="text" id="pipeline-reject-reason" class="reject-reason-input" placeholder="반려 사유...">
        <button class="btn-reject-confirm" onclick="pipelineReject()">반려 확정</button>
        <button class="btn-reject-cancel" onclick="document.getElementById('pipeline-reject-wrap').style.display='none'">취소</button>
      </div>`;
  }

  let infoRows = `
    <div class="pipeline-info-row"><span class="pipeline-info-label">URL</span><span class="pipeline-info-val">${esc(url)}</span></div>
    <div class="pipeline-info-row"><span class="pipeline-info-label">현재 단계</span><span class="pipeline-info-val">${STEP_LABELS[currentStep] || currentStep}</span></div>
    <div class="pipeline-info-row"><span class="pipeline-info-label">힐링 횟수</span><span class="pipeline-info-val">${healCount}</span></div>`;

  if (state.rejection_reason) {
    infoRows += `<div class="pipeline-info-row"><span class="pipeline-info-label">반려 사유</span><span class="pipeline-info-val" style="color:var(--revision-color)">${esc(state.rejection_reason)}</span></div>`;
  }
  if (execResult.passed !== undefined) {
    infoRows += `<div class="pipeline-info-row"><span class="pipeline-info-label">테스트 결과</span><span class="pipeline-info-val" style="color:${execResult.failed ? 'var(--revision-color)' : 'var(--approved-color)'}">PASS: ${execResult.passed || 0} / FAIL: ${execResult.failed || 0}</span></div>`;
  }

  main.innerHTML = `
    <div class="pipeline-view">
      <div class="pipeline-title">단일 파이프라인</div>
      <div class="step-progress">${stepsHtml}</div>
      <div class="pipeline-info">${infoRows}</div>
      ${actionsHtml}
    </div>`;

  // 상태 없으면 실행 패널 + 안내 표시
  if (!state.step) {
    main.innerHTML = `
      <div class="pipeline-view">
        <div class="pipeline-title">단일 파이프라인</div>
        ${buildRunPanel('single')}
        <div class="empty"><div class="empty-icon">&#x1F50D;</div><h2>파이프라인 비활성</h2><p>위에서 URL과 케이스를 선택해 실행하거나, 터미널에서 run_qa.py를 실행하세요</p></div>
      </div>`;
  } else {
    // 이미 실행 중이어도 상단에 실행 패널 추가
    const view = main.querySelector('.pipeline-view');
    if (view) {
      const titleEl = view.querySelector('.pipeline-title');
      if (titleEl) titleEl.insertAdjacentHTML('afterend', buildRunPanel('single'));
    }
  }

  // 선택값 복원
  const pageSel = document.getElementById('run-page-select');
  const caseSel = document.getElementById('run-case-select');
  if (pageSel && prevPage) { pageSel.value = prevPage; onPageSelect(); }
  if (caseSel && prevCase) caseSel.value = prevCase;
}

async function pipelineReset() {
  if (!confirm('파이프라인 상태를 초기화하시겠습니까?')) return;
  try {
    const res = await fetch('/api/pipeline/reset', { method: 'POST' });
    const data = await res.json();
    if (data.ok) { showToast('파이프라인 초기화 완료', 'success'); await refreshAll(); }
    else showToast('초기화 실패: ' + (data.error || ''));

}

async function pipelineApprove() {
  try {
    await fetch('/api/pipeline/approve', { method: 'POST' });

    showHookAlert('single_approved', url ? url + ' 테스트 승인됨' : '테스트 승인됨');

function pipelineRejectToggle() {

async function pipelineReject() {

}

// ── Parallel Pipeline ──
function buildParallelStepProgress(status, files, totalTargets) {
  // generating은 스크립트가 아닌 Claude Code가 수행 → 파일 생성 여부로 추론
  let effectiveStatus = status;
  if (status === 'ready' && files.length > 0 && files.length < totalTargets) {
    effectiveStatus = 'generating';
  } else if (status === 'ready' && totalTargets > 0 && files.length >= totalTargets) {
    effectiveStatus = 'generating';  // 완료 직전
  }

  const isHeal = effectiveStatus === 'heal_needed' || effectiveStatus === 'heal_failed';
  const stepIdx = isHeal ? PARALLEL_STEPS.length : PARALLEL_STEPS.indexOf(effectiveStatus);

  let html = '';
  PARALLEL_STEPS.forEach((step, i) => {
    let cls = '';
    if (stepIdx >= 0 && i < stepIdx) cls = 'done';
    else if (i === stepIdx) cls = 'active';
    if (isHeal && i === PARALLEL_STEPS.length - 1) cls = 'active';
    const labelCls = cls;
    const num = i + 1;
    const label = (isHeal && i === PARALLEL_STEPS.length - 1)
      ? PARALLEL_STEP_LABELS[effectiveStatus]
      : PARALLEL_STEP_LABELS[step];
    html += `<div class="step-node"><div class="step-circle ${cls}">${i < stepIdx ? '&#10003;' : num}</div><div class="step-label ${labelCls}">${label}</div></div>`;
    if (i < PARALLEL_STEPS.length - 1) {
      html += `<div class="step-line ${stepIdx >= 0 && i < stepIdx ? 'done' : ''}"></div>`;
    }
  });
  return `<div class="step-progress">${html}</div>`;
}

function renderParallelPipeline(main) {
  const batch = batchState || {};
  const ps = batch.parallel_state || {};
  const files = batch.generated_files || [];
  const status = ps.status || '';
  const totalTargets = ps.total_count || 0;
  const execResult = ps.execution_result || null;

  // step-progress 바
  const stepProgressHtml = status ? buildParallelStepProgress(status, files, totalTargets) : '';

  // 상태 정보 행
  let infoRows = '';
  if (status) {
    const displayStatus = PARALLEL_STEP_LABELS[status] || status;
    const healCount = (execResult && execResult.heal_count) || 0;
    infoRows = `<div class="pipeline-info" style="margin-bottom:16px;">
      <div class="pipeline-info-row"><span class="pipeline-info-label">상태</span><span class="pipeline-info-val">${esc(displayStatus)}</span></div>
      <div class="pipeline-info-row"><span class="pipeline-info-label">대상</span><span class="pipeline-info-val">${totalTargets}개 케이스</span></div>
      <div class="pipeline-info-row"><span class="pipeline-info-label">생성 파일</span><span class="pipeline-info-val">${files.length}개${totalTargets ? ' / ' + totalTargets + '개' : ''}</span></div>
      ${healCount ? `<div class="pipeline-info-row"><span class="pipeline-info-label">힐링 횟수</span><span class="pipeline-info-val">${healCount}</span></div>` : ''}
    </div>`;
  }

  // 그룹별 파일 묶기
  const groups = {};
  files.forEach(f => {
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push(f);
  });
  const groupNames = Object.keys(groups).sort();

  let filesHtml = '';
  if (groupNames.length) {
    filesHtml = `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:12px;">
      <thead><tr style="color:var(--text-dim);text-align:left;border-bottom:1px solid var(--border);">

      </tr></thead><tbody>`;
    groupNames.forEach(g => {
      const gFiles = groups[g];
      const totalSize = gFiles.reduce((sum, f) => sum + f.size, 0);
      filesHtml += `<tr style="border-bottom:1px solid var(--border);">
        <td style="padding:6px 12px;color:var(--text);">${esc(g)}</td>
        <td style="padding:6px 12px;text-align:right;color:var(--text-dim);">${gFiles.length}개</td>

      </tr>`;
    });
    filesHtml += '</tbody></table>';
  }

  // summaryHtml은 infoRows로 대체됨 (step-progress 바 아래 표시)
  const summaryHtml = '';

  // 실행 결과 카드
  let execResultHtml = '';
  if (execResult) {
    const allPass = execResult.failed === 0;
    const badgeCls = allPass ? 'pass' : 'fail';
    const badgeTxt = allPass ? 'ALL PASS' : `${execResult.failed} FAILED`;

    // 그룹별 결과
    const gr = execResult.group_results || {};
    const grNames = Object.keys(gr).sort();
    let groupResultsHtml = '';
    if (grNames.length) {
      groupResultsHtml = '<div class="group-result-list">';
      grNames.forEach(g => {
        const gd = gr[g];
        const gPass = gd.failed === 0;
        const gCls = gPass ? 'pass' : 'fail';
        const gBadge = gPass ? 'PASS' : 'FAIL';
        groupResultsHtml += `
          <div class="group-result-item">
            <span class="group-result-dot ${gCls}"></span>
            <span class="group-result-name">${esc(g.replace(/_/g, ' ').toUpperCase())}</span>
            <span class="group-result-count">${gd.passed}/${gd.passed + gd.failed} passed</span>
            <span class="group-result-badge ${gCls}">${gBadge}</span>
          </div>`;
      });
      groupResultsHtml += '</div>';
    }

    execResultHtml = `
      <div class="exec-result-card">
        <div class="exec-result-header">
          <span class="exec-result-title">테스트 실행 결과</span>
          <span class="exec-result-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="exec-result-stats">
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--text)">${execResult.total}</div><div class="exec-stat-label">Total</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--approved-color)">${execResult.passed}</div><div class="exec-stat-label">Passed</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--revision-color)">${execResult.failed}</div><div class="exec-stat-label">Failed</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:${allPass ? 'var(--approved-color)' : 'var(--revision-color)'}">${execResult.pass_rate}%</div><div class="exec-stat-label">Pass Rate</div></div>
        </div>
        ${groupResultsHtml}
        <div style="margin-top:12px;font-size:11px;color:var(--text-dim);">
          실행: ${esc(execResult.executed_at || '')} | 힐링: ${execResult.heal_count || 0}회
          ${execResult.report_name ? ` | <a href="#" onclick="event.preventDefault();showParallelReport('${esc(execResult.report_name)}')" style="color:var(--senior-accent);text-decoration:none;">리포트 보기</a>` : ''}
        </div>
      </div>
      <div class="parallel-report-wrap" id="parallel-report-wrap" style="display:${_uiState.parallelReportName ? 'block' : 'none'};">
        <div style="display:flex;justify-content:flex-end;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border);">
          <button style="font-size:11px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:2px 10px;cursor:pointer;" onclick="_uiState.parallelReportName=null;this.closest('.parallel-report-wrap').style.display='none';document.getElementById('parallel-report-iframe').src='';">닫기</button>
        </div>
        <iframe id="parallel-report-iframe"${_uiState.parallelReportName ? ` src="/reports/${esc(_uiState.parallelReportName)}"` : ''}></iframe>
      </div>`;
  }

  const mlVisible = _uiState.mergeLogVisible;
  main.innerHTML = `
    <div class="pipeline-view">
      <div class="pipeline-title">병렬 파이프라인</div>

      </div>
      <div id="merge-log-area" style="${mlVisible ? '' : 'display:none;'}margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;max-height:400px;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:12px;font-weight:600;color:var(--text-dim);">MERGE LOG</span>
          <button style="font-size:11px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:2px 8px;cursor:pointer;" onclick="_uiState.mergeLogVisible=false;document.getElementById('merge-log-area').style.display='none'">닫기</button>

        <pre id="merge-log-content" style="font-size:11px;color:var(--text);white-space:pre-wrap;word-break:break-all;font-family:Consolas,monospace;margin:0;">${esc(_uiState.mergeLogContent)}</pre>

      ${files.length ? `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;">

function showParallelReport(name) {

  const iframe = document.getElementById('parallel-report-iframe');
  if (wrap && iframe) {
    if (wrap.style.display === 'none') {

      iframe.src = '/reports/' + name;
      wrap.style.display = 'block';
      wrap.scrollIntoView({behavior:'smooth'});
    } else {
      _uiState.parallelReportName = null;
      wrap.style.display = 'none';
      iframe.src = '';
    }
  }
}

async function runMerge() {
  const btn = document.getElementById('merge-btn');
  if (btn) { btn.textContent = '실행 중...'; btn.disabled = true; }
  try {
    const res = await fetch('/api/run_merge', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      if (btn) btn.textContent = '실행됨 (PID: ' + (data.pid || '?') + ')';
      _uiState.mergeLogVisible = true;
      const logBtn = document.getElementById('merge-log-btn');
      if (logBtn) logBtn.style.display = 'inline-block';
      // 3초 후 로그 자동 표시
      setTimeout(showMergeLog, 3000);
      // 30초 후 버튼 복원
      setTimeout(() => { if (btn) { btn.textContent = '99_merge.py 실행'; btn.disabled = false; } }, 30000);
    } else {
      showToast('오류: ' + (data.error || 'unknown'));
      if (btn) { btn.textContent = '99_merge.py 실행'; btn.disabled = false; }
    }
  } catch(e) {
    showToast('서버 연결 오류');
    if (btn) { btn.textContent = '99_merge.py 실행'; btn.disabled = false; }
  }
}

async function showMergeLog() {
  try {
    const res = await fetch('/api/merge_log', { method: 'POST' });
    const data = await res.json();
    _uiState.mergeLogVisible = true;
    _uiState.mergeLogContent = data.log || '(로그 없음)';
    const area = document.getElementById('merge-log-area');
    const content = document.getElementById('merge-log-content');
    if (area && content) {
      content.textContent = _uiState.mergeLogContent;
      area.style.display = 'block';
      area.scrollTop = area.scrollHeight;
    }
    const logBtn = document.getElementById('merge-log-btn');
    if (logBtn) logBtn.style.display = 'inline-block';

async function quickReset() {

// ── Quick Run ──
let _quickRunState = { running: false, logVisible: false, logContent: '' };

function renderQuickRun(main) {
  // 체크 상태 보존
  const prevChecked = {};
  document.querySelectorAll('.quick-group-cb').forEach(cb => { prevChecked[cb.value] = cb.checked; });

  const groups = generatedGroups || [];
  const execResult = quickState ? quickState.execution_result : null;

  let groupsHtml = '';
  if (groups.length) {
    groupsHtml = groups.map(g => {
      const checked = prevChecked[g.name] !== undefined ? prevChecked[g.name] : true;
      return `<label class="quick-group-item">
        <input type="checkbox" class="quick-group-cb" value="${esc(g.name)}" ${checked ? 'checked' : ''}>
        <span class="quick-group-name">${esc(g.name)}</span>
        <span class="quick-group-count">${g.file_count}개 파일</span>
      </label>`;
    }).join('');
  } else {
    groupsHtml = '<div style="padding:12px;font-size:13px;color:var(--text-dim);">생성된 테스트 폴더가 없습니다. 먼저 병렬 파이프라인으로 테스트 코드를 생성하세요.</div>';
  }

  // 실행 결과 카드
  let resultHtml = '';
  if (execResult) {
    const allPass = execResult.failed === 0;
    const badgeCls = allPass ? 'pass' : 'fail';
    const badgeTxt = allPass ? 'ALL PASS' : `${execResult.failed} FAILED`;
    const gr = execResult.group_results || {};
    const grNames = Object.keys(gr).sort();
    let groupResultsHtml = '';
    if (grNames.length) {
      groupResultsHtml = '<div class="group-result-list">';
      grNames.forEach(g => {
        const gd = gr[g];
        const gPass = gd.failed === 0;
        const gCls = gPass ? 'pass' : 'fail';
        const gBadge = gPass ? 'PASS' : 'FAIL';
        groupResultsHtml += `
          <div class="group-result-item">
            <span class="group-result-dot ${gCls}"></span>
            <span class="group-result-name">${esc(g.replace(/_/g, ' ').toUpperCase())}</span>
            <span class="group-result-count">${gd.passed}/${gd.passed + gd.failed} passed</span>
            <span class="group-result-badge ${gCls}">${gBadge}</span>
          </div>`;
      });
      groupResultsHtml += '</div>';
    }
    resultHtml = `
      <div class="exec-result-card">
        <div class="exec-result-header">
          <span class="exec-result-title">실행 결과</span>
          <span class="exec-result-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="exec-result-stats">
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--text)">${execResult.total}</div><div class="exec-stat-label">Total</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--approved-color)">${execResult.passed}</div><div class="exec-stat-label">Passed</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:var(--revision-color)">${execResult.failed}</div><div class="exec-stat-label">Failed</div></div>
          <div class="exec-stat"><div class="exec-stat-num" style="color:${allPass ? 'var(--approved-color)' : 'var(--revision-color)'}">${execResult.pass_rate}%</div><div class="exec-stat-label">Pass Rate</div></div>
        </div>
        ${groupResultsHtml}
        <div style="margin-top:12px;font-size:11px;color:var(--text-dim);">
          실행: ${esc(execResult.executed_at || '')} | 힐링: ${execResult.heal_count || 0}회
          ${execResult.report_name ? ` | <a href="/reports/${esc(execResult.report_name)}" target="_blank" style="color:var(--senior-accent);text-decoration:none;">리포트 보기</a>` : ''}
        </div>
      </div>`;
  }

  const logVis = _quickRunState.logVisible;
  main.innerHTML = `
    <div class="pipeline-view">
      <div class="pipeline-title">빠른 실행</div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:16px;">
        tests/generated/ 에 이미 생성된 테스트 코드를 바로 실행합니다. 전체 파이프라인을 거치지 않습니다.
      </p>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:13px;font-weight:600;">테스트 폴더 선택</span>
          <label style="font-size:12px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="checkbox" id="quick-select-all" onchange="quickToggleAll(this.checked)" checked>
            전체 선택
          </label>
        </div>
        <div class="quick-group-list">${groupsHtml}</div>
        <div style="display:flex;gap:10px;align-items:center;margin-top:14px;">
          <button class="action-btn action-btn-primary" id="quick-run-btn" onclick="runQuickTest()" ${!groups.length ? 'disabled' : ''}>
            ${_quickRunState.running ? '실행 중...' : '테스트 실행'}
          </button>
          ${!groups.length ? '<span style="font-size:11px;color:var(--danger);">tests/generated/ 에 생성된 테스트가 없습니다</span>' : ''}
        </div>
      </div>
      <div class="run-log-box" id="run-quick-log" style="display:${logVis ? 'block' : 'none'};margin-bottom:16px;">
        <pre id="run-quick-log-content" style="margin:0;">${esc(_quickRunState.logContent || '(대기 중...)')}</pre>
      </div>
      <button class="log-toggle-btn" id="log-toggle-quick" onclick="toggleLogExpand('run-quick-log')" style="display:${logVis ? 'inline-block' : 'none'};margin-bottom:16px;">확대</button>
      ${resultHtml}
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <button class="action-btn action-btn-danger" onclick="quickReset()">빠른 실행 초기화</button>
      </div>
    </div>`;

  // 체크 상태 복원 후 전체선택 체크박스 상태 동기화
  const allCb = document.getElementById('quick-select-all');
  const cbs = document.querySelectorAll('.quick-group-cb');
  if (allCb && cbs.length) {
    allCb.checked = Array.from(cbs).every(cb => cb.checked);
  }
}

function quickToggleAll(checked) {
  document.querySelectorAll('.quick-group-cb').forEach(cb => { cb.checked = checked; });
}

async function runQuickTest() {
  const cbs = document.querySelectorAll('.quick-group-cb:checked');
  const groups = Array.from(cbs).map(cb => cb.value);
  if (!groups.length) { showToast('실행할 폴더를 선택하세요', 'info'); return; }

  const btn = document.getElementById('quick-run-btn');
  _quickRunState.running = true;
  _quickRunState.logContent = '';
  // 이전 실행 결과 클리어 (다른 그룹 결과 혼입 방지)
  quickState = {};
  if (btn) { btn.textContent = '실행 중...'; btn.disabled = true; }
  // 결과 카드 즉시 제거
  const oldResult = document.querySelector('.exec-result-card');
  if (oldResult) oldResult.remove();

  try {
    const res = await fetch('/api/run_quick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ groups }),
    });
    const data = await res.json();
    if (data.ok) {
      if (btn) btn.textContent = '실행됨 (PID: ' + (data.pid || '?') + ')';
      _quickRunState.logVisible = true;
      startLogPolling('run-quick-log', 'run-quick-log-content', 'quick_run.txt');
      // 완료 대기 → 결과 자동 갱신
      const checkDone = setInterval(async () => {
        await fetchQuickState();
        const qs = quickState || {};
        if (qs.status === 'done' || qs.status === 'heal_needed' || qs.status === 'heal_failed') {
          clearInterval(checkDone);
          // 로그 폴링 정리 + 최종 로그 보존
          if (_logTimers['run-quick-log']) {
            clearInterval(_logTimers['run-quick-log']);
            delete _logTimers['run-quick-log'];
          }
          const logEl = document.getElementById('run-quick-log-content');
          if (logEl) _quickRunState.logContent = logEl.textContent;
          _quickRunState.running = false;
          if (currentView === 'quick_run') renderQuickRun(document.getElementById('main'));
          if (btn) { btn.textContent = '테스트 실행'; btn.disabled = false; }
        }
      }, 3000);
      // 최대 5분 후 자동 해제
      setTimeout(() => {
        clearInterval(checkDone);
        _quickRunState.running = false;
        if (btn) { btn.textContent = '테스트 실행'; btn.disabled = false; }
      }, 300000);
    } else {
      showToast('오류: ' + (data.error || 'unknown'));
      _quickRunState.running = false;
      if (btn) { btn.textContent = '테스트 실행'; btn.disabled = false; }
    }
  } catch(e) {
    showToast('서버 연결 오류');
    _quickRunState.running = false;
    if (btn) { btn.textContent = '테스트 실행'; btn.disabled = false; }
  }
}

// ── Team Discussion (preserved) ──
function renderMessage(msg, tabId, sessIdx, msgIdx) {
  const roleLabel  = ROLE_LABEL[msg.from] || msg.from;
  const roleClass  = ROLE_CLASS[msg.from] || '';
  const bubbleClass= BUBBLE_CLASS[msg.from] || '';
  const uid = `${tabId}_${sessIdx}_${msgIdx}`;

  let planToggle = '';
  const plan = msg.metadata && msg.metadata.proposed_plan;
  if (plan) {
    const planJson = esc(JSON.stringify(plan, null, 2));
    planToggle = `<button class="plan-toggle" onclick="togglePlan('${uid}')">&#9654; proposed_plan 보기</button><div class="plan-body" id="plan-${uid}">${planJson}</div>`;
  }

  let statusTag = '';
  if (msg.status && MSG_STATUS_STYLE[msg.status]) {
    const label = msg.status === 'approved' ? '&#10003; 승인' : '&#8617; 수정 요청';
    statusTag = `<span class="msg-status-tag" style="${MSG_STATUS_STYLE[msg.status]}">${label}</span>`;
  }

  return `<div class="msg"><div class="msg-meta"><span class="role-badge ${roleClass}">${roleLabel}</span><span>${fmtTime(msg.timestamp)}</span></div><div class="msg-bubble ${bubbleClass}">${esc(msg.content)}</div>${planToggle}${statusTag}</div>`;
}

function renderSession(session, tabId, idx) {
  const stageLabel  = session.stage_label || session.stage;
  const statusLabel = STATUS_LABEL[session.status] || session.status;
  const statusClass = STATUS_CLASS[session.status] || '';
  const key = `${tabId}_${idx}`;
  const collapsed = (collapsedSessions[tabId] || new Set()).has(idx);

  const msgsHtml = session.messages && session.messages.length
    ? session.messages.map((m, mi) => renderMessage(m, tabId, idx, mi)).join('')
    : '<div class="waiting-msg">대화 대기 중...</div>';

  const isDiscussed = session.stage === 'team_discussion' && session.status === 'discussed';
  let approveBar = '';
  if (isDiscussed) {
    const items = lastData && lastData.discuss_state && lastData.discuss_state.conclusion_items;
    approveBar = items ? renderVoteSection(key, items) : '<div class="approve-bar"><span class="approve-bar-label">결론 항목 파싱 중...</span></div>';
  }

  return `<div class="session" id="sess-${key}"><div class="session-header" onclick="toggleSession('${tabId}',${idx})"><span class="session-stage">${stageLabel}</span><span class="status-badge ${statusClass}">${statusLabel}</span><span class="session-toggle" id="stgl-${key}">${collapsed?'&#9654;':'&#9660;'}</span></div><div class="messages${collapsed?' collapsed':''}" id="msgs-${key}">${msgsHtml}</div>${approveBar}</div>`;
}

function renderTeamView(main) {
  if (!lastData) return;
  let sessions = [];
  if (currentView.startsWith('team_')) {
    const idx = parseInt(currentView.replace('team_', ''));
    const ts = lastData.team_sessions || [];
    sessions = ts[idx] ? [ts[idx]] : [];
  }
  if (!sessions.length) {
    main.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F4AC;</div><h2>토론 대기 중</h2><p>왼쪽 패널에서 주제를 입력하고 토론을 시작하세요</p></div>';
    return;
  }
  main.innerHTML = sessions.map((s, i) => renderSession(s, currentView, i)).join('');
}

function renderVoteSection(key, items) {
  const total = items.length;
  const done = items.filter(i => i.status !== 'pending').length;
  const itemsHtml = items.map(item => {
    let actionHtml;
    if (item.status === 'approved') actionHtml = '<span class="vote-tag vote-tag-approve">&#10003; 승인</span>';
    else if (item.status === 'rejected') actionHtml = '<span class="vote-tag vote-tag-reject">&#10007; 반려</span>';
    else actionHtml = `<button class="vote-btn-n" onclick="event.stopPropagation();voteItem('${key}',${item.id},'reject')">&#10007;</button><button class="vote-btn-y" onclick="event.stopPropagation();voteItem('${key}',${item.id},'approve')">&#10003; 승인</button>`;
    return `<div class="vote-item" id="vi-${key}-${item.id}" data-status="${esc(item.status)}" onclick="toggleVoteItem('${key}',${item.id})"><div class="vote-item-top"><span class="vote-item-title">${esc(item.title)}</span><div id="va-${key}-${item.id}">${actionHtml}</div></div><div class="vote-item-body">${esc(item.text)}</div></div>`;
  }).join('');
  return `<div class="vote-section"><div class="vote-section-header"><span class="vote-section-label">항목별 검토</span><span class="vote-progress" id="vp-${key}">${done} / ${total} 완료</span></div><div id="vitems-${key}">${itemsHtml}</div></div>`;
}

// ── Utility functions ──
function togglePlan(uid) {
  const body = document.getElementById('plan-' + uid);
  if (!body) return;
  body.classList.toggle('open');
}

function toggleSession(tabId, idx) {
  const key = `${tabId}_${idx}`;
  const msgs = document.getElementById('msgs-' + key);
  if (!msgs) return;
  const collapsed = msgs.classList.toggle('collapsed');
  const tgl = document.getElementById('stgl-' + key);
  if (tgl) tgl.textContent = collapsed ? '\u25B6' : '\u25BC';
  if (!collapsedSessions[tabId]) collapsedSessions[tabId] = new Set();
  if (collapsed) collapsedSessions[tabId].add(idx);
  else collapsedSessions[tabId].delete(idx);
}

function toggleVoteItem(key, id) {
  const el = document.getElementById(`vi-${key}-${id}`);
  if (el) el.classList.toggle('collapsed');
}

async function voteItem(key, itemId, vote) {
  const actEl = document.getElementById(`va-${key}-${itemId}`);
  const itemEl = document.getElementById(`vi-${key}-${itemId}`);
  if (actEl) actEl.innerHTML = '<span style="font-size:11px;color:var(--text-dim)">&#9203;</span>';
  try {
    const res = await fetch('/api/discuss/vote_item', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({item_id:itemId, vote}),
    });
    const data = await res.json();
    if (!data.ok) { if (actEl) actEl.innerHTML = '<span style="color:var(--revision-color);font-size:11px">오류</span>'; return; }
    const status = vote === 'approve' ? 'approved' : 'rejected';
    if (itemEl) itemEl.dataset.status = status;
    if (actEl) actEl.innerHTML = status === 'approved' ? '<span class="vote-tag vote-tag-approve">&#10003; 승인</span>' : '<span class="vote-tag vote-tag-reject">&#10007; 반려</span>';
    const progEl = document.getElementById(`vp-${key}`);
    if (progEl) {
      const all = document.querySelectorAll(`#vitems-${key} .vote-item`);
      const doneCnt = Array.from(all).filter(el => el.dataset.status !== 'pending').length;
      progEl.textContent = `${doneCnt} / ${all.length} 완료`;
    }
    if (data.all_voted) {
      showHookAlert('discuss_approved', '승인된 항목이 team_notes에 저장되었습니다');
      setTimeout(() => { lastJson = ''; refreshAll(); }, 600);
    }
  } catch(e) {
    if (actEl) actEl.innerHTML = `<span style="color:var(--revision-color);font-size:11px">오류</span>`;
  }
}

// ── Import (Excel → tc_*.md) ──
async function loadImportFiles() {
  try {
    const res = await fetch('/api/import/files');
    const data = await res.json();
    const sel = document.getElementById('import-file-select');
    if (!sel) return;
    const prev = sel.value;
    sel.innerHTML = '<option value="">파일 선택...</option>';
    (data.files || []).forEach(f => {
      sel.innerHTML += `<option value="${esc(f)}">${esc(f)}</option>`;
    });
    if (prev) sel.value = prev;
  } catch(e) {}
}

async function onImportFileSelect() {
  const sel = document.getElementById('import-file-select');
  const listEl = document.getElementById('import-sheet-list');
  const btn = document.getElementById('import-convert-btn');
  const statusEl = document.getElementById('import-status');
  const resultsEl = document.getElementById('import-results');
  listEl.innerHTML = ''; btn.disabled = true;
  statusEl.textContent = ''; statusEl.className = 'import-status';
  resultsEl.innerHTML = '';
  const file = sel.value;
  if (!file) return;
  statusEl.textContent = '시트 분석 중...';
  try {
    const res = await fetch(`/api/import/sheets?file=${encodeURIComponent(file)}`);
    const data = await res.json();
    if (!data.ok) { statusEl.textContent = data.error || '분석 실패'; statusEl.className = 'import-status err'; return; }
    const sheets = data.sheets || [];
    if (!sheets.length) { statusEl.textContent = '변환 가능한 시트 없음'; statusEl.className = 'import-status err'; return; }
    statusEl.textContent = `${sheets.length}개 시트 발견`;
    listEl.innerHTML = `<label class="import-sheet-item" style="border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:4px;">
      <input type="checkbox" id="import-select-all" onchange="importToggleAll(this.checked)" checked>
      <span class="import-sheet-name" style="font-weight:600;">전체 선택</span>
    </label>` + sheets.map(s => `<label class="import-sheet-item">
      <input type="checkbox" class="import-sheet-cb" value="${esc(s.name)}" checked>
      <span class="import-sheet-name">${esc(s.name)}</span>
      <span class="import-sheet-count">${s.count}건</span>
    </label>`).join('');
    btn.disabled = false;
  } catch(e) { statusEl.textContent = '서버 연결 오류'; statusEl.className = 'import-status err'; }
}

function importToggleAll(checked) {
  document.querySelectorAll('.import-sheet-cb').forEach(cb => { cb.checked = checked; });
}

async function runImportConvert() {
  const file = document.getElementById('import-file-select').value;
  const cbs = document.querySelectorAll('.import-sheet-cb:checked');
  const sheets = Array.from(cbs).map(cb => cb.value);
  const btn = document.getElementById('import-convert-btn');
  const statusEl = document.getElementById('import-status');
  const resultsEl = document.getElementById('import-results');
  if (!file || !sheets.length) { showToast('시트를 선택하세요', 'info'); return; }
  btn.disabled = true; btn.textContent = '변환 중...';
  statusEl.textContent = ''; resultsEl.innerHTML = '';
  try {
    const res = await fetch('/api/import/convert', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file, sheets })
    });
    const data = await res.json();
    if (data.ok) {
      const total = (data.results || []).reduce((s, r) => s + (r.count || 0), 0);
      statusEl.textContent = `변환 완료: 총 ${total}건`;
      statusEl.className = 'import-status ok';
      resultsEl.innerHTML = (data.results || []).map(r =>
        `<div class="import-result-item">${esc(r.sheet)}: <span class="count">${r.count}건</span> → ${esc(r.folder || '')}</div>`
      ).join('');
      showToast(`${sheets.length}개 시트, ${total}건 변환 완료`, 'success');
    } else {
      statusEl.textContent = data.error || '변환 실패';
      statusEl.className = 'import-status err';
    }
  } catch(e) { statusEl.textContent = '서버 연결 오류'; statusEl.className = 'import-status err'; }
  btn.disabled = false; btn.textContent = '변환';
}

// 페이지 로드 시 import 파일 목록 로드
setTimeout(loadImportFiles, 500);

async function submitTopic() {
  const input = document.getElementById('new-topic-input');
  const btn = document.getElementById('new-topic-btn');
  const status = document.getElementById('topic-status');
  const topic = input.value.trim();
  if (!topic) { status.textContent = '주제를 입력해주세요.'; status.className = 'topic-status err'; return; }
  btn.disabled = true;
  status.textContent = '전송 중...'; status.className = 'topic-status';
  try {
    const res = await fetch('/api/discuss/start', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic}) });
    const data = await res.json();
    if (data.ok) { status.textContent = '주제 등록됨'; status.className = 'topic-status ok'; input.value = ''; showHookAlert('discuss', topic); }
    else { status.textContent = data.error || '전송 실패'; status.className = 'topic-status err'; }
  } catch(e) { status.textContent = '서버 연결 오류'; status.className = 'topic-status err'; }
  btn.disabled = false;
}

async function resetDialog() {
  if (!confirm('대화 기록을 초기화하시겠습니까?')) return;
  try { await fetch('/api/reset', { method:'POST' }); lastJson = ''; await refreshAll(); }
  catch(e) { showToast('초기화 실패'); }
}

// ── Sidebar update ──
function updateSidebar(data) {
  const teamTabs = document.getElementById('team-tabs');
  const teamSessions = data.team_sessions || [];
  if (teamSessions.length > 0) {
    teamTabs.innerHTML = teamSessions.map((s, idx) => {
      const tid = 'team_' + idx;
      const dotCls = s.status === 'approved' ? 'done' : s.status === 'in_progress' ? 'active-run' : 'pending';
      const isActive = currentView === tid;
      const label = s.topic || s.stage_label || '토론';
      return `<div class="sidebar-item${isActive?' active':''}" id="tab-${tid}" onclick="selectView('${tid}')"><div class="sidebar-dot ${dotCls}"></div><span class="sidebar-name" title="${esc(label)}">${esc(label)}</span></div>`;
    }).join('');
  } else {
    teamTabs.innerHTML = '<div style="padding:6px 14px;font-size:12px;color:var(--text-dim);">토론 없음</div>';
  }

  // 파이프라인 dot 업데이트
  const singleDot = document.getElementById('dot-single');
  if (singleDot && pipelineState && pipelineState.step) {
    const s = pipelineState.step;
    singleDot.className = 'sidebar-dot ' + (s === 'done' ? 'done' : (s !== 'init' ? 'active-run' : ''));
  }
  const parallelDot = document.getElementById('dot-parallel');
  if (parallelDot && batchState) {
    const pStatus = (batchState.parallel_state || {}).status || '';
    let dotCls = '';
    if (pStatus === 'done') dotCls = 'done';
    else if (['analyzing','ready','generating','testing','heal_needed'].includes(pStatus)) dotCls = 'active-run';
    else if (pStatus === 'heal_failed') dotCls = 'pending';
    parallelDot.className = 'sidebar-dot ' + dotCls;
  }
}

// ── Data fetching ──
function applyDialogData(text) {
  if (text === lastJson) return;
  lastJson = text;
  lastData = JSON.parse(text);
  refreshCount++;
  const now = new Date().toLocaleTimeString('ko-KR', {hour12:false});
  document.getElementById('header-meta').textContent = `${now} · ${refreshCount}회`;
  updateSidebar(lastData);
  if (currentView.startsWith('team_') || currentView === '') renderCurrentView();
}

async function fetchPipelineState() {

    const res = await fetch('/api/pipeline_state?' + Date.now());
    if (res.ok) pipelineState = await res.json();
  } catch(e) {}
}

function _shouldSkipRender() {
  // 사용자가 select/input 조작 중이면 스킵
  const mainEl = document.getElementById('main');
  if (mainEl && mainEl.contains(document.activeElement)
      && (document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'INPUT')) {
    return true;
  }
  // iframe이 열려 있으면 스킵 (리포트 보는 중)
  const reportWrap = document.getElementById('report-iframe-wrap');
  if (reportWrap && reportWrap.style.display !== 'none') return true;
  const parallelReportWrap = document.getElementById('parallel-report-wrap');
  if (parallelReportWrap && parallelReportWrap.style.display !== 'none') return true;
  // 빠른 실행 중 로그 폴링 시 DOM 재생성 방지
  if (currentView === 'quick_run' && _quickRunState.running) return true;
  return false;
}

function _saveScrollPos() {
  const scroll = document.querySelector('.content-scroll');
  if (scroll && currentView) _uiState.scrollTop[currentView] = scroll.scrollTop;
}

function _restoreScrollPos() {
  const scroll = document.querySelector('.content-scroll');
  if (scroll && currentView && _uiState.scrollTop[currentView]) {
    scroll.scrollTop = _uiState.scrollTop[currentView];
  }
}

async function refreshAll() {
  await Promise.all([
    fetch('/api/dialogs?' + Date.now()).then(r => r.ok ? r.text() : null).then(t => { if (t) applyDialogData(t); }),
    fetchPipelineState(),
    fetchBatchState(),
    fetchReports(),
    fetchPages(),
    fetchGeneratedGroups(),
    fetchQuickState(),
  ]);
  updateSidebar(lastData || {});
  if (!_shouldSkipRender()) {
    _saveScrollPos();
    renderCurrentView();
    _restoreScrollPos();
  }
}

// SSE — state/pipeline.json 변경 시 파이프라인 상태도 즉시 갱신
function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = async e => {
    applyDialogData(e.data);
    await fetchPipelineState();
    await fetchBatchState();
    if (!_shouldSkipRender()) {
      _saveScrollPos();
      renderCurrentView();
      _restoreScrollPos();
    }
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

connectSSE();
refreshAll();
setInterval(refreshAll, 5000);
</script>
