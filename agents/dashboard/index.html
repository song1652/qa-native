<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA 컨트롤 센터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/views/pipeline.css">
  <link rel="stylesheet" href="/static/css/views/parallel.css">
  <link rel="stylesheet" href="/static/css/views/quick-run.css">
  <link rel="stylesheet" href="/static/css/views/reports.css">
  <link rel="stylesheet" href="/static/css/views/team.css">
  <link rel="stylesheet" href="/static/css/views/overview.css">
  <link rel="stylesheet" href="/static/css/views/import.css">
  <link rel="stylesheet" href="/static/css/animations.css">
</head>

<body>

  <div style="position:fixed;width:500px;height:500px;background:rgba(139,92,246,0.12);border-radius:50%;filter:blur(120px);top:-5%;left:-5%;z-index:-1;pointer-events:none;animation:float 12s infinite ease-in-out;"></div>
  <div style="position:fixed;width:600px;height:600px;background:rgba(88,40,180,0.08);border-radius:50%;filter:blur(120px);bottom:-10%;right:-5%;z-index:-1;pointer-events:none;animation:float 14s infinite ease-in-out;animation-delay:-3s;"></div>
  <div style="position:fixed;width:350px;height:350px;background:rgba(109,40,217,0.06);border-radius:50%;filter:blur(100px);top:40%;left:40%;z-index:-1;pointer-events:none;animation:float 16s infinite ease-in-out;animation-delay:-6s;"></div>

  <div class="toast-container" id="toast-container"></div>
  <div class="header">
    <div class="live-indicator">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="header-title" onclick="selectView('')" style="cursor:pointer;">QA CONTROL CENTER</div>
    <div style="flex:1"></div>
    <button class="reset-btn" onclick="resetDialog()" id="reset-btn">대화 초기화</button>
    <div class="header-meta" id="header-meta"></div>
  </div>

  <div class="body-wrap">
    <!-- 사이드바 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <!-- 파이프라인 섹션 -->
        <div class="sidebar-section">
          <div class="sidebar-label">파이프라인</div>
          <div class="sidebar-item" id="tab-single_pipeline" onclick="selectView('single_pipeline')">
            <div class="sidebar-dot" id="dot-single"></div>
            <span class="sidebar-name">단일 파이프라인</span>
          </div>
          <div class="sidebar-item" id="tab-parallel_pipeline" onclick="selectView('parallel_pipeline')">
            <div class="sidebar-dot" id="dot-parallel"></div>
            <span class="sidebar-name">병렬 파이프라인</span>
          </div>
          <div class="sidebar-item" id="tab-quick_run" onclick="selectView('quick_run')">
            <div class="sidebar-dot" id="dot-quick"></div>
            <span class="sidebar-name">빠른 실행</span>
          </div>
        </div>

        <!-- 테스트 리포트 섹션 -->
        <div class="sidebar-section">
          <div class="sidebar-label">테스트 리포트</div>
          <div class="sidebar-item" id="tab-reports" onclick="selectView('reports')">
            <div class="sidebar-dot"></div>
            <span class="sidebar-name">리포트 목록</span>
          </div>
        </div>

        <!-- 팀 토론 섹션 -->
        <div class="sidebar-section" id="team-section">
          <div class="sidebar-label">팀 토론</div>
          <div style="padding: 6px 12px 10px;">
            <div
              style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">
              새 토론 주제</div>
            <textarea class="new-topic-input" id="new-topic-input" placeholder="주제를 입력하세요..." rows="3"></textarea>
            <button class="new-topic-btn" id="new-topic-btn" onclick="submitTopic()">토론 시작</button>
            <div class="topic-status" id="topic-status"></div>
            <div style="font-size:10px;color:var(--text-dim);margin-top:6px;line-height:1.5;"></div>
          </div>
          <div id="team-tabs"></div>
        </div>

        <!-- Import 섹션 -->
        <div class="sidebar-section" id="import-section">
          <div class="sidebar-label">Import</div>
          <div style="padding: 6px 12px 10px;">
            <div
              style="font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">
              Excel → 테스트케이스</div>
            <select class="run-form-select" id="import-file-select" onchange="onImportFileSelect()"
              style="width:100%;margin-bottom:6px;">
              <option value="">파일 선택...</option>
            </select>
            <div id="import-sheet-list" class="import-sheet-list"></div>
            <button class="import-convert-btn" id="import-convert-btn" onclick="runImportConvert()" disabled>변환</button>
            <div class="import-status" id="import-status"></div>
            <div id="import-results"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽 콘텐츠 -->
    <div class="content-wrap">
      <div class="content-scroll" id="main">
        <div class="empty">
          <div class="empty-icon">&#x1F3AF;</div>
          <h2>QA 컨트롤 센터</h2>
          <p>왼쪽 패널에서 항목을 선택하세요</p>
        </div>
      </div>
    </div>
  </div>

  <!-- JS: constants → state → utils → api → components → views → router → app -->
  <script src="/static/js/constants.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components/sidebar.js"></script>
  <script src="/static/js/components/test-list.js"></script>
  <script src="/static/js/components/group-result.js"></script>
  <script src="/static/js/views/overview.js"></script>
  <script src="/static/js/views/pipeline.js"></script>
  <script src="/static/js/views/parallel.js"></script>
  <script src="/static/js/views/quick-run.js"></script>
  <script src="/static/js/views/reports.js"></script>
  <script src="/static/js/views/team.js"></script>
  <script src="/static/js/views/import.js"></script>
  <script src="/static/js/router.js"></script>
  <script src="/static/js/app.js"></script>
</body>

</html>
